version: '3.8'

services:
  portal:
    build: .
    ports:
      - "8090:8080"
      - "8091:8081"
    environment:
      - PORT=8080
      - ADMIN_PORT=8081
      - NATS_URL=nats://nats:4222
      - DB_DSN=host=postgres user=admin password=admin dbname=guestwifi port=5432 sslmode=disable
    depends_on:
      - nats
      - postgres

  nats:
    image: nats:alpine
    ports:
      - "14222:4222"
      - "18222:8222" # Management port

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=guestwifi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "15432:5432"

volumes:
  postgres_data:
