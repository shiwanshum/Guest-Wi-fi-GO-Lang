<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Internet Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/portal.css">
</head>
<body>
    <div class="portal-container">
        <!-- Registration View -->
        <div class="card" id="registration-view">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                </div>
                <h1>Company Guest Wi-Fi</h1>
                <p>Register for internet access</p>
            </div>
            <form id="registration-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" required placeholder="e.g., +1 234 567 8900">
                </div>
                <div class="input-group">
                    <label for="company">Organization (Optional)</label>
                    <input type="text" id="company" placeholder="Where are you visiting from?">
                </div>
                <div class="input-group">
                    <label for="purpose">Purpose of Visit</label>
                    <select id="purpose" required>
                        <option value="" disabled selected>Select a purpose</option>
                        <option value="meeting">Business Meeting</option>
                        <option value="interview">Interview</option>
                        <option value="contractor">Contractor/Vendor</option>
                        <option value="personal">Personal</option>
                    </select>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I accept the <a href="#" id="terms-link">Terms & Conditions</a></label>
                </div>
                <button type="submit" class="btn primary-btn" id="send-otp-btn">
                    <span>Send OTP</span>
                    <div class="loader" id="reg-loader"></div>
                </button>
            </form>
        </div>

        <!-- OTP View -->
        <div class="card hidden" id="otp-view">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <h1>Verification</h1>
                <p>Enter the 4-digit OTP sent to your mobile</p>
            </div>
            <form id="otp-form">
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-digit" pattern="[0-9]" required autofocus>
                    <input type="text" maxlength="1" class="otp-digit" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="otp-digit" pattern="[0-9]" required>
                    <input type="text" maxlength="1" class="otp-digit" pattern="[0-9]" required>
                </div>
                <button type="submit" class="btn primary-btn" id="verify-btn">
                    <span>Verify & Connect</span>
                    <div class="loader" id="otp-loader"></div>
                </button>
                <p class="resend-text">Didn't receive it? <a href="#" id="resend-link">Resend OTP</a></p>
            </form>
        </div>

        <!-- Success View -->
        <div class="card hidden" id="success-view">
            <div class="brand">
                <div class="logo success-logo">
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h1>Internet Connected</h1>
                <p>Your access has been granted.</p>
            </div>
            <div class="session-info">
                <div class="info-row">
                    <span class="info-label">Assigned IP:</span>
                    <span class="info-value" id="display-ip">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Connection Time:</span>
                    <span class="info-value" id="display-time">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Session Valid For:</span>
                    <span class="info-value">2 Hours</span>
                </div>
            </div>
            <button class="btn primary-btn" onclick="window.location.href='https://google.com'">Start Browsing</button>
        </div>
    </div>
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <!-- User-Agent processing library to simplify things -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.35/ua-parser.min.js"></script>
    <script src="/static/portal.js"></script>
</body>
</html>
